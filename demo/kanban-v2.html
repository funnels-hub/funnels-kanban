<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>치과 상담 예약 대시보드 — v2 Compact Cards</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard Variable', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
            xl: 'calc(var(--radius) + 4px)',
            '2xl': 'calc(var(--radius) + 8px)',
            '3xl': 'calc(var(--radius) + 12px)',
            '4xl': 'calc(var(--radius) + 16px)',
          },
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
            popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
            primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
            secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
            muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
            accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
            destructive: { DEFAULT: 'var(--destructive)' },
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)',
            chart: {
              1: 'var(--chart-1)',
              2: 'var(--chart-2)',
              3: 'var(--chart-3)',
              4: 'var(--chart-4)',
              5: 'var(--chart-5)',
            },
            sidebar: {
              DEFAULT: 'var(--sidebar)',
              foreground: 'var(--sidebar-foreground)',
              primary: 'var(--sidebar-primary)',
              'primary-foreground': 'var(--sidebar-primary-foreground)',
              accent: 'var(--sidebar-accent)',
              'accent-foreground': 'var(--sidebar-accent-foreground)',
              border: 'var(--sidebar-border)',
              ring: 'var(--sidebar-ring)',
            },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    :root {
      --font-sans: "Pretendard Variable", ui-sans-serif, system-ui, sans-serif;
      --radius: 0.625rem;

      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.145 0 0);
      --popover: oklch(1 0 0);
      --popover-foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0);
      --primary-foreground: oklch(0.985 0 0);
      --secondary: oklch(0.97 0 0);
      --secondary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0);
      --accent-foreground: oklch(0.205 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --border: oklch(0.922 0 0);
      --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0);
      --chart-1: oklch(0.646 0.222 41.116);
      --chart-2: oklch(0.6 0.118 184.704);
      --chart-3: oklch(0.398 0.07 227.392);
      --chart-4: oklch(0.828 0.189 84.429);
      --chart-5: oklch(0.769 0.188 70.08);
      --sidebar: oklch(0.985 0 0);
      --sidebar-foreground: oklch(0.145 0 0);
      --sidebar-primary: oklch(0.205 0 0);
      --sidebar-primary-foreground: oklch(0.985 0 0);
      --sidebar-accent: oklch(0.97 0 0);
      --sidebar-accent-foreground: oklch(0.205 0 0);
      --sidebar-border: oklch(0.922 0 0);
      --sidebar-ring: oklch(0.708 0 0);
    }

    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0);
      --card-foreground: oklch(0.985 0 0);
      --popover: oklch(0.205 0 0);
      --popover-foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --border: oklch(1 0 0 / 10%);
      --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.556 0 0);
      --chart-1: oklch(0.488 0.243 264.376);
      --chart-2: oklch(0.696 0.17 162.48);
      --chart-3: oklch(0.769 0.188 70.08);
      --chart-4: oklch(0.627 0.265 303.9);
      --chart-5: oklch(0.645 0.246 16.439);
      --sidebar: oklch(0.205 0 0);
      --sidebar-foreground: oklch(0.985 0 0);
      --sidebar-primary: oklch(0.488 0.243 264.376);
      --sidebar-primary-foreground: oklch(0.985 0 0);
      --sidebar-accent: oklch(0.269 0 0);
      --sidebar-accent-foreground: oklch(0.985 0 0);
      --sidebar-border: oklch(1 0 0 / 10%);
      --sidebar-ring: oklch(0.556 0 0);
    }

    * { border-color: var(--border); outline-color: color-mix(in oklch, var(--ring) 50%, transparent); }
    body {
      font-family: var(--font-sans);
      background-color: var(--background);
      color: var(--foreground);
    }

    /* Scrollbar */
    .scroll-area::-webkit-scrollbar { height: 10px; width: 10px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb {
      background: color-mix(in oklch, var(--muted-foreground) 30%, transparent);
      border-radius: 9999px;
    }
    .scroll-area::-webkit-scrollbar-thumb:hover {
      background: color-mix(in oklch, var(--muted-foreground) 50%, transparent);
    }

    /* Sticky overlap fix */
    .grid-row:hover .time-cell { background-color: color-mix(in oklch, var(--accent) 60%, transparent); }
  </style>
</head>
<body class="min-h-screen">
  <!-- App Bar -->
  <header class="sticky top-0 z-40 h-14 border-b bg-background/80 backdrop-blur-md">
    <div class="h-full px-6 flex items-center justify-between gap-4 min-w-[1200px]">
      <!-- Logo -->
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-primary text-primary-foreground flex items-center justify-center">
          <i data-lucide="activity" class="w-4 h-4"></i>
        </div>
        <div class="flex flex-col leading-tight">
          <span class="text-sm font-semibold tracking-tight">Dental Consult</span>
          <span class="text-[10px] text-muted-foreground">상담 예약 대시보드</span>
        </div>
      </div>

      <!-- Date Nav -->
      <div class="flex items-center gap-1 border rounded-lg h-9 px-1 bg-card">
        <button class="h-7 w-7 inline-flex items-center justify-center rounded-md hover:bg-accent transition">
          <i data-lucide="chevron-left" class="w-4 h-4"></i>
        </button>
        <button class="h-7 px-3 inline-flex items-center gap-2 rounded-md hover:bg-accent transition">
          <i data-lucide="calendar" class="w-3.5 h-3.5 text-muted-foreground"></i>
          <span class="text-sm font-medium tabular-nums">2026-04-01</span>
          <span class="text-xs text-muted-foreground">(수)</span>
        </button>
        <button class="h-7 w-7 inline-flex items-center justify-center rounded-md hover:bg-accent transition">
          <i data-lucide="chevron-right" class="w-4 h-4"></i>
        </button>
      </div>

      <!-- Right actions -->
      <div class="flex items-center gap-2">
        <div class="relative">
          <i data-lucide="search" class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-muted-foreground"></i>
          <input type="text" placeholder="환자 검색 (이름/차트번호)"
                 class="h-9 w-64 pl-8 pr-3 rounded-lg border bg-card text-sm placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring/40" />
        </div>
        <button class="h-9 w-9 inline-flex items-center justify-center rounded-lg border bg-card hover:bg-accent transition">
          <i data-lucide="bell" class="w-4 h-4"></i>
        </button>
        <button id="theme-toggle" class="h-9 w-9 inline-flex items-center justify-center rounded-lg border bg-card hover:bg-accent transition">
          <i data-lucide="moon" class="w-4 h-4 block dark:hidden"></i>
          <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i>
        </button>
        <button onclick="if(confirm('카드 위치를 초기 상태로 되돌릴까요?')){localStorage.removeItem('kanban-v2-state');location.reload();}"
                class="inline-flex items-center gap-1 text-xs text-muted-foreground hover:text-foreground px-2 py-1 rounded hover:bg-muted">
          <i data-lucide="rotate-ccw" class="size-3.5"></i> 초기화
        </button>
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-chart-1 to-chart-3 flex items-center justify-center text-white text-xs font-semibold">YS</div>
      </div>
    </div>
  </header>

  <main class="px-6 py-5 min-w-[1200px]">
    <!-- KPI cards -->
    <section class="grid grid-cols-6 gap-3 mb-4">
      <!-- 총예약 -->
      <div class="rounded-lg border bg-card shadow-sm p-3.5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-muted-foreground">총 예약</span>
          <i data-lucide="calendar-days" class="w-3.5 h-3.5 text-muted-foreground"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="text-2xl font-bold tabular-nums">18</span>
          <span class="text-xs font-medium text-emerald-600 dark:text-emerald-400">+3</span>
        </div>
        <p class="text-[11px] text-muted-foreground mt-1">어제 대비</p>
      </div>
      <!-- 성공 -->
      <div class="rounded-lg border bg-card shadow-sm p-3.5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-muted-foreground">성공</span>
          <i data-lucide="check-circle-2" class="w-3.5 h-3.5 text-emerald-500"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="text-2xl font-bold tabular-nums">3</span>
          <i data-lucide="trending-up" class="w-3.5 h-3.5 text-emerald-500"></i>
        </div>
        <p class="text-[11px] text-muted-foreground mt-1">상담 완료</p>
      </div>
      <!-- 대기 -->
      <div class="rounded-lg border bg-card shadow-sm p-3.5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-muted-foreground">대기</span>
          <i data-lucide="clock" class="w-3.5 h-3.5 text-slate-400"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="text-2xl font-bold tabular-nums">8</span>
          <span class="text-xs font-medium text-muted-foreground">—</span>
        </div>
        <p class="text-[11px] text-muted-foreground mt-1">예약 대기중</p>
      </div>
      <!-- 취소 -->
      <div class="rounded-lg border bg-card shadow-sm p-3.5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-muted-foreground">취소</span>
          <i data-lucide="x-circle" class="w-3.5 h-3.5 text-amber-500"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="text-2xl font-bold tabular-nums">6</span>
          <span class="text-xs font-medium text-rose-600 dark:text-rose-400 inline-flex items-center gap-0.5">
            -4% <i data-lucide="trending-down" class="w-3 h-3"></i>
          </span>
        </div>
        <p class="text-[11px] text-muted-foreground mt-1">전일 대비</p>
      </div>
      <!-- 신환 -->
      <div class="rounded-lg border bg-card shadow-sm p-3.5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-muted-foreground">신환</span>
          <i data-lucide="user-plus" class="w-3.5 h-3.5 text-chart-2"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="text-2xl font-bold tabular-nums">3</span>
          <span class="text-xs font-medium text-emerald-600 dark:text-emerald-400">+1</span>
        </div>
        <p class="text-[11px] text-muted-foreground mt-1">오늘 신규</p>
      </div>
      <!-- 성공률 -->
      <div class="rounded-lg border bg-card shadow-sm p-3.5">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs text-muted-foreground">성공률</span>
          <i data-lucide="target" class="w-3.5 h-3.5 text-muted-foreground"></i>
        </div>
        <div class="flex items-baseline gap-1.5">
          <span class="text-2xl font-bold tabular-nums">16%</span>
        </div>
        <div class="mt-2 h-1.5 w-full rounded-full bg-secondary overflow-hidden">
          <div class="h-full bg-primary rounded-full" style="width: 16%"></div>
        </div>
      </div>
    </section>

    <!-- Filter toolbar -->
    <section class="flex items-center justify-between gap-4 mb-4">
      <div class="flex items-center gap-3">
        <!-- 상담사 ToggleGroup -->
        <div class="inline-flex items-center gap-1 text-xs">
          <span class="text-muted-foreground mr-1">상담사</span>
          <div class="inline-flex rounded-lg border bg-card p-0.5">
            <button class="h-7 px-3 text-xs font-medium rounded-md bg-primary text-primary-foreground">전체</button>
            <button class="h-7 px-3 text-xs font-medium rounded-md text-muted-foreground hover:text-foreground hover:bg-accent transition">김수지</button>
            <button class="h-7 px-3 text-xs font-medium rounded-md text-muted-foreground hover:text-foreground hover:bg-accent transition">라근주</button>
            <button class="h-7 px-3 text-xs font-medium rounded-md text-muted-foreground hover:text-foreground hover:bg-accent transition">유소연</button>
          </div>
        </div>

        <div class="h-6 w-px bg-border"></div>

        <!-- 상태 Badge 토글 -->
        <div class="inline-flex items-center gap-1.5 text-xs flex-wrap">
          <span class="text-muted-foreground mr-1">상태</span>
          <button class="inline-flex items-center gap-1 h-7 px-2.5 rounded-full border border-emerald-500/30 bg-emerald-500/10 text-emerald-700 dark:text-emerald-400 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
            성공 <span class="tabular-nums opacity-70">3</span>
          </button>
          <button class="inline-flex items-center gap-1 h-7 px-2.5 rounded-full border border-slate-400/30 bg-slate-400/10 text-slate-700 dark:text-slate-300 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-slate-400"></span>
            대기 <span class="tabular-nums opacity-70">8</span>
          </button>
          <button class="inline-flex items-center gap-1 h-7 px-2.5 rounded-full border border-amber-400/30 bg-amber-400/10 text-amber-700 dark:text-amber-400 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-amber-400"></span>
            취소 <span class="tabular-nums opacity-70">6</span>
          </button>
          <button class="inline-flex items-center gap-1 h-7 px-2.5 rounded-full border border-fuchsia-500/30 bg-fuchsia-500/10 text-fuchsia-700 dark:text-fuchsia-400 font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-fuchsia-500"></span>
            예약x <span class="tabular-nums opacity-70">2</span>
          </button>
          <button class="inline-flex items-center gap-1 h-7 px-2.5 rounded-full border bg-card text-muted-foreground hover:text-foreground hover:bg-accent transition font-medium">
            <span class="w-1.5 h-1.5 rounded-full bg-muted-foreground/50"></span>
            기본 <span class="tabular-nums opacity-70">2</span>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button class="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg border bg-card text-sm hover:bg-accent transition">
          <i data-lucide="filter" class="w-3.5 h-3.5"></i>
          필터
        </button>
        <button class="h-8 px-3 inline-flex items-center gap-1.5 rounded-lg bg-primary text-primary-foreground text-sm font-medium hover:opacity-90 transition">
          <i data-lucide="plus" class="w-3.5 h-3.5"></i>
          예약 추가
        </button>
      </div>
    </section>

    <!-- Grid -->
    <section class="rounded-xl border bg-card shadow-sm overflow-hidden">
      <div class="scroll-area overflow-auto max-h-[calc(100vh-260px)]">
        <!-- Header Rows: 2-tier (유형 → 상담사) -->
        <div class="sticky top-0 z-30">
          <!-- Tier 1: 유형 -->
          <div class="grid bg-muted/60 backdrop-blur border-b" style="grid-template-columns: 80px repeat(7, minmax(150px, 1fr));">
            <div class="h-10 sticky left-0 z-10 bg-muted/90 border-r flex items-center justify-center text-[11px] font-medium text-muted-foreground">시간</div>
            <div class="h-10 border-r flex items-center justify-center gap-1.5 text-xs font-semibold">
              <span class="w-1.5 h-1.5 rounded-full bg-chart-1"></span>구환
            </div>
            <div class="h-10 border-r flex items-center justify-center gap-1.5 text-xs font-semibold">
              <span class="w-1.5 h-1.5 rounded-full bg-chart-2"></span>신환
            </div>
            <div class="h-10 border-r flex items-center justify-center gap-1.5 text-xs font-semibold">
              <span class="w-1.5 h-1.5 rounded-full bg-chart-3"></span>임플
            </div>
            <div class="h-10 border-r flex items-center justify-center gap-1.5 text-xs font-semibold">
              <span class="w-1.5 h-1.5 rounded-full bg-chart-4"></span>일반
            </div>
            <div class="h-10 border-r flex items-center justify-center gap-1.5 text-xs font-semibold">
              <span class="w-1.5 h-1.5 rounded-full bg-chart-5"></span>예진
            </div>
            <div class="h-10 border-r flex items-center justify-center gap-1.5 text-xs font-semibold">
              <i data-lucide="phone" class="w-3 h-3"></i>전화
            </div>
            <div class="h-10 flex items-center justify-center gap-1.5 text-xs font-semibold text-muted-foreground">
              <i data-lucide="x" class="w-3 h-3"></i>취소
            </div>
          </div>
          <!-- Tier 2: 상담사 -->
          <div class="grid bg-background/80 backdrop-blur border-b" style="grid-template-columns: 80px repeat(7, minmax(150px, 1fr));">
            <div class="h-7 sticky left-0 z-10 bg-background/95 border-r"></div>
            <div class="h-7 border-r flex items-center justify-center text-[10px] text-muted-foreground">김수지 · 라근주 · 유소연</div>
            <div class="h-7 border-r flex items-center justify-center text-[10px] text-muted-foreground">신규 접수</div>
            <div class="h-7 border-r flex items-center justify-center text-[10px] text-muted-foreground">김수지 · 라근주 · 유소연</div>
            <div class="h-7 border-r flex items-center justify-center text-[10px] text-muted-foreground">일반 진료</div>
            <div class="h-7 border-r flex items-center justify-center text-[10px] text-muted-foreground">예비 진단</div>
            <div class="h-7 border-r flex items-center justify-center text-[10px] text-muted-foreground">전화 상담</div>
            <div class="h-7 flex items-center justify-center text-[10px] text-muted-foreground">취소 기록</div>
          </div>
        </div>

        <!-- Rows -->
        <div id="grid-body"></div>
      </div>
    </section>

    <!-- Footer legend -->
    <footer class="mt-4 flex items-center justify-between text-[11px] text-muted-foreground">
      <div class="flex items-center gap-4 flex-wrap">
        <span class="inline-flex items-center gap-1.5"><span class="w-0.5 h-3 bg-emerald-500 rounded"></span>성공</span>
        <span class="inline-flex items-center gap-1.5"><span class="w-0.5 h-3 bg-slate-300 rounded"></span>대기</span>
        <span class="inline-flex items-center gap-1.5"><span class="w-0.5 h-3 bg-amber-400 rounded"></span>취소</span>
        <span class="inline-flex items-center gap-1.5"><span class="w-0.5 h-3 bg-fuchsia-500 rounded"></span>예약x</span>
        <span class="inline-flex items-center gap-1.5"><span class="w-0.5 h-3 bg-transparent border border-border rounded"></span>기본</span>
      </div>
      <span>Dental Consult Dashboard · v2 Compact Cards</span>
    </footer>
  </main>

  <script>
    // --- Data ---
    // status: 'success' | 'waiting' | 'cancel' | 'noshow' | 'basic'
    // column: 'guhwan' | 'sinhwan' | 'implant' | 'general' | 'yejin' | 'phone' | 'cancel'
    const APPOINTMENTS = [
      // 임플
      { time: '11:30', name: '김민정', chart: '17542', sub: '그외',   type: '임플', col: 'implant', status: 'success' },
      { time: '12:00', name: '박종호', chart: '17541', sub: '그외',   type: '임플', col: 'implant', status: 'waiting' },
      { time: null,    name: '이승재', chart: '17545', sub: '—',      type: '임플', col: 'implant', status: 'noshow' },
      { time: null,    name: '서성욱', chart: '9595',  sub: '기존',   type: '임플', col: 'implant', status: 'basic' },
      { time: '11:50', name: '오희선', chart: '17543', sub: '그외',   type: '임플', col: 'implant', status: 'waiting' },
      { time: '17:00', name: '김화정', chart: '17548', sub: '그외',   type: '임플', col: 'implant', status: 'waiting' },
      { time: '16:00', name: '이현순', chart: '17546', sub: '그외',   type: '임플', col: 'implant', status: 'waiting' },
      { time: '16:30', name: '이해룡', chart: '17547', sub: '그외',   type: '임플', col: 'implant', status: 'waiting' },
      { time: '20:30', name: '김도희', chart: '17553', sub: '그외',   type: '임플', col: 'implant', status: 'waiting' },

      // 신환
      { time: '11:30', name: '박종호', chart: '17541', sub: '신환',   type: '신환', col: 'sinhwan', status: 'waiting' },
      { time: '10:00', name: '서성욱', chart: '9595',  sub: '복귀',   type: '신환', col: 'sinhwan', status: 'basic' },

      // 구환
      { time: '12:00', name: '서예진', chart: '474',   sub: '재방문', type: '구환', col: 'guhwan', status: 'noshow' },

      // 예진
      { time: '14:00', name: '최남숙', chart: '17544', sub: '예진',   type: '예진', col: 'yejin', status: 'basic' },

      // 일반
      { time: '16:00', name: '박경호', chart: '17406', sub: '정기',   type: '일반', col: 'general', status: 'waiting' },
      { time: '17:30', name: '김정애', chart: '977',   sub: '정기',   type: '일반', col: 'general', status: 'waiting' },
      { time: '19:00', name: '손민채', chart: '17550', sub: '정기',   type: '일반', col: 'general', status: 'cancel' },
      { time: '17:30', name: '홍단우', chart: '17549', sub: '정기',   type: '일반', col: 'general', status: 'cancel' },

      // 취소 기록 6건 (시간 미정 → 상단 배치)
      { time: '09:00', name: '임용채', chart: '17501', sub: '당일취소', type: '취소', col: 'cancel', status: 'cancel' },
      { time: '10:30', name: '주성중', chart: '17502', sub: '변경',    type: '취소', col: 'cancel', status: 'cancel' },
      { time: '13:00', name: '박종애', chart: '17503', sub: '당일취소', type: '취소', col: 'cancel', status: 'cancel' },
      { time: '14:30', name: '이은선', chart: '17504', sub: '변경',    type: '취소', col: 'cancel', status: 'cancel' },
      { time: '15:30', name: '남명숙', chart: '17505', sub: '당일취소', type: '취소', col: 'cancel', status: 'cancel' },
      { time: '18:00', name: '임승준', chart: '17506', sub: '변경',    type: '취소', col: 'cancel', status: 'cancel' },
    ];

    const COLUMNS = ['guhwan', 'sinhwan', 'implant', 'general', 'yejin', 'phone', 'cancel'];

    // 24 rows: 09:00 ~ 20:30, 30분 단위
    const HOURS = [];
    for (let h = 9; h <= 20; h++) {
      HOURS.push(`${String(h).padStart(2, '0')}:00`);
      HOURS.push(`${String(h).padStart(2, '0')}:30`);
    }

    const TYPE_BADGE_BG = {
      '임플': 'bg-chart-3/15 text-chart-3',
      '신환': 'bg-chart-2/15 text-chart-2',
      '구환': 'bg-chart-1/15 text-chart-1',
      '일반': 'bg-chart-4/15 text-chart-4',
      '예진': 'bg-chart-5/15 text-chart-5',
      '취소': 'bg-muted text-muted-foreground',
    };

    const STATUS_STRIPE = {
      success: 'border-l-emerald-500',
      waiting: 'border-l-slate-300',
      cancel:  'border-l-amber-400',
      noshow:  'border-l-fuchsia-500',
      basic:   'border-l-transparent',
    };

    const STATUS_PILL = {
      success: { dot: 'bg-emerald-500',  label: '성공', cls: 'text-emerald-700 dark:text-emerald-400' },
      waiting: { dot: 'bg-slate-400',    label: '대기', cls: 'text-slate-700 dark:text-slate-300' },
      cancel:  { dot: 'bg-amber-400',    label: '취소', cls: 'text-amber-700 dark:text-amber-400' },
      noshow:  { dot: 'bg-fuchsia-500',  label: '예약x', cls: 'text-fuchsia-700 dark:text-fuchsia-400' },
      basic:   { dot: 'bg-muted-foreground/50', label: '기본', cls: 'text-muted-foreground' },
    };

    const CHART_COUNTS = {};
    function cardHTML(appt) {
      const stripe = STATUS_STRIPE[appt.status];
      const pill = STATUS_PILL[appt.status];
      const badgeCls = TYPE_BADGE_BG[appt.type] || 'bg-secondary text-secondary-foreground';
      const timeStr = appt.time || '—:—';
      const n = (CHART_COUNTS[appt.chart] = (CHART_COUNTS[appt.chart] || 0) + 1);
      const cardId = n === 1 ? `card-${appt.chart}` : `card-${appt.chart}-${n}`;
      return `
        <div draggable="true" data-card-id="${cardId}" class="group relative rounded-lg border border-border/60 bg-card shadow-sm
                    transition-all duration-200
                    hover:shadow-md hover:-translate-y-0.5 hover:border-border
                    px-2.5 py-2 cursor-pointer
                    border-l-4 ${stripe}">
          <div class="flex items-center justify-between gap-2 mb-0.5">
            <span class="text-[11px] font-medium text-muted-foreground tabular-nums">${timeStr}</span>
            <span class="inline-flex items-center h-4 px-1.5 rounded ${badgeCls} text-[10px] font-medium">${appt.type}</span>
          </div>
          <div class="text-sm font-semibold text-foreground leading-tight truncate">${appt.name}</div>
          <div class="text-[11px] text-muted-foreground truncate">#${appt.chart} · ${appt.sub}</div>
          <div class="mt-1 flex items-center gap-1">
            <span class="inline-flex items-center gap-1 text-[10px] font-medium ${pill.cls}">
              <span class="w-1 h-1 rounded-full ${pill.dot}"></span>${pill.label}
            </span>
          </div>
        </div>
      `;
    }

    function bucketTime(t) {
      // Round DOWN to nearest 30-min slot label used in HOURS
      if (!t) return null;
      const [hh, mm] = t.split(':').map(Number);
      const slot = mm < 30 ? '00' : '30';
      return `${String(hh).padStart(2, '0')}:${slot}`;
    }

    function renderGrid() {
      const body = document.getElementById('grid-body');
      // Prepare a map keyed by "HH:MM|col"
      const cellMap = new Map();
      const unscheduled = { implant: [], sinhwan: [] };
      APPOINTMENTS.forEach(a => {
        const slot = bucketTime(a.time);
        if (!slot) {
          // unscheduled: noshow/basic with no time → push to first row
          if (unscheduled[a.col]) unscheduled[a.col].push(a);
          return;
        }
        const key = `${slot}|${a.col}`;
        if (!cellMap.has(key)) cellMap.set(key, []);
        cellMap.get(key).push(a);
      });

      let html = '';
      HOURS.forEach((time, idx) => {
        const isHour = time.endsWith(':00');
        const rowBorder = isHour ? 'border-b' : 'border-b border-dashed border-border/50';
        html += `<div class="grid-row grid ${rowBorder} hover:bg-muted/20 transition-colors" style="grid-template-columns: 80px repeat(7, minmax(150px, 1fr));">`;
        // Time cell
        html += `
          <div class="time-cell sticky left-0 z-10 bg-card border-r px-2 py-1.5 flex items-start justify-end">
            <span class="text-[11px] font-medium tabular-nums ${isHour ? 'text-foreground' : 'text-muted-foreground/60'}">${time}</span>
          </div>
        `;
        COLUMNS.forEach(col => {
          const key = `${time}|${col}`;
          const items = cellMap.get(key) || [];
          // attach unscheduled to first hour row
          if (idx === 0 && unscheduled[col] && unscheduled[col].length) {
            items.push(...unscheduled[col]);
            unscheduled[col] = [];
          }
          html += `
            <div class="border-r last:border-r-0 p-1.5">
              <div data-drop-zone="${time}-${col}" class="flex flex-col gap-1.5 min-h-[72px]">
                ${items.map(cardHTML).join('')}
              </div>
            </div>
          `;
        });
        html += `</div>`;
      });
      body.innerHTML = html;
    }

    renderGrid();

    // Dark mode toggle
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
      lucide.createIcons();
    });

    lucide.createIcons();
  </script>

  <script>
    (function() {
      const STORAGE_KEY = 'kanban-v2-state';
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      Object.entries(saved).forEach(([cardId, zoneId]) => {
        const card = document.querySelector(`[data-card-id="${cardId}"]`);
        const zone = document.querySelector(`[data-drop-zone="${zoneId}"]`);
        if (card && zone) zone.appendChild(card);
      });
      document.querySelectorAll('[draggable="true"]').forEach(card => {
        card.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', card.dataset.cardId);
          e.dataTransfer.effectAllowed = 'move';
          card.classList.add('opacity-50');
        });
        card.addEventListener('dragend', () => card.classList.remove('opacity-50'));
      });
      document.querySelectorAll('[data-drop-zone]').forEach(zone => {
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          zone.classList.add('bg-primary/10', 'ring-2', 'ring-primary', 'ring-inset');
        });
        zone.addEventListener('dragleave', () => {
          zone.classList.remove('bg-primary/10', 'ring-2', 'ring-primary', 'ring-inset');
        });
        zone.addEventListener('drop', (e) => {
          e.preventDefault();
          zone.classList.remove('bg-primary/10', 'ring-2', 'ring-primary', 'ring-inset');
          const cardId = e.dataTransfer.getData('text/plain');
          const card = document.querySelector(`[data-card-id="${cardId}"]`);
          if (card) {
            zone.appendChild(card);
            const state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
            state[cardId] = zone.dataset.dropZone;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          }
        });
      });
    })();
  </script>
</body>
</html>
