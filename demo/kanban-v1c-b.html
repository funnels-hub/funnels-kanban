<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>v1c-b — 치과 상담 예약 Kanban (2계층 + 그룹별 비즈니스 규칙)</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard Variable', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
            xl: 'calc(var(--radius) + 4px)',
            '2xl': 'calc(var(--radius) + 8px)',
            '3xl': 'calc(var(--radius) + 12px)',
            '4xl': 'calc(var(--radius) + 16px)',
          },
          colors: {
            background: 'var(--background)',
            foreground: 'var(--foreground)',
            card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
            popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
            primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
            secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
            muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
            accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
            destructive: { DEFAULT: 'var(--destructive)' },
            border: 'var(--border)',
            input: 'var(--input)',
            ring: 'var(--ring)',
            chart: {
              1: 'var(--chart-1)',
              2: 'var(--chart-2)',
              3: 'var(--chart-3)',
              4: 'var(--chart-4)',
              5: 'var(--chart-5)',
            },
            sidebar: {
              DEFAULT: 'var(--sidebar)',
              foreground: 'var(--sidebar-foreground)',
              primary: 'var(--sidebar-primary)',
              'primary-foreground': 'var(--sidebar-primary-foreground)',
              accent: 'var(--sidebar-accent)',
              'accent-foreground': 'var(--sidebar-accent-foreground)',
              border: 'var(--sidebar-border)',
              ring: 'var(--sidebar-ring)',
            },
          },
        },
      },
    }
  </script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <style>
    :root {
      --font-sans: "Pretendard Variable", ui-sans-serif, system-ui, sans-serif;
      --radius: 0.625rem;

      --background: oklch(1 0 0);
      --foreground: oklch(0.145 0 0);
      --card: oklch(1 0 0);
      --card-foreground: oklch(0.145 0 0);
      --popover: oklch(1 0 0);
      --popover-foreground: oklch(0.145 0 0);
      --primary: oklch(0.205 0 0);
      --primary-foreground: oklch(0.985 0 0);
      --secondary: oklch(0.97 0 0);
      --secondary-foreground: oklch(0.205 0 0);
      --muted: oklch(0.97 0 0);
      --muted-foreground: oklch(0.556 0 0);
      --accent: oklch(0.97 0 0);
      --accent-foreground: oklch(0.205 0 0);
      --destructive: oklch(0.577 0.245 27.325);
      --border: oklch(0.922 0 0);
      --input: oklch(0.922 0 0);
      --ring: oklch(0.708 0 0);
      --chart-1: oklch(0.646 0.222 41.116);
      --chart-2: oklch(0.6 0.118 184.704);
      --chart-3: oklch(0.398 0.07 227.392);
      --chart-4: oklch(0.828 0.189 84.429);
      --chart-5: oklch(0.769 0.188 70.08);
      --sidebar: oklch(0.985 0 0);
      --sidebar-foreground: oklch(0.145 0 0);
      --sidebar-primary: oklch(0.205 0 0);
      --sidebar-primary-foreground: oklch(0.985 0 0);
      --sidebar-accent: oklch(0.97 0 0);
      --sidebar-accent-foreground: oklch(0.205 0 0);
      --sidebar-border: oklch(0.922 0 0);
      --sidebar-ring: oklch(0.708 0 0);
    }

    .dark {
      --background: oklch(0.145 0 0);
      --foreground: oklch(0.985 0 0);
      --card: oklch(0.205 0 0);
      --card-foreground: oklch(0.985 0 0);
      --popover: oklch(0.205 0 0);
      --popover-foreground: oklch(0.985 0 0);
      --primary: oklch(0.922 0 0);
      --primary-foreground: oklch(0.205 0 0);
      --secondary: oklch(0.269 0 0);
      --secondary-foreground: oklch(0.985 0 0);
      --muted: oklch(0.269 0 0);
      --muted-foreground: oklch(0.708 0 0);
      --accent: oklch(0.269 0 0);
      --accent-foreground: oklch(0.985 0 0);
      --destructive: oklch(0.704 0.191 22.216);
      --border: oklch(1 0 0 / 10%);
      --input: oklch(1 0 0 / 15%);
      --ring: oklch(0.556 0 0);
      --chart-1: oklch(0.488 0.243 264.376);
      --chart-2: oklch(0.696 0.17 162.48);
      --chart-3: oklch(0.769 0.188 70.08);
      --chart-4: oklch(0.627 0.265 303.9);
      --chart-5: oklch(0.645 0.246 16.439);
      --sidebar: oklch(0.205 0 0);
      --sidebar-foreground: oklch(0.985 0 0);
      --sidebar-primary: oklch(0.488 0.243 264.376);
      --sidebar-primary-foreground: oklch(0.985 0 0);
      --sidebar-accent: oklch(0.269 0 0);
      --sidebar-accent-foreground: oklch(0.985 0 0);
      --sidebar-border: oklch(1 0 0 / 10%);
      --sidebar-ring: oklch(0.556 0 0);
    }

    * { border-color: var(--border); outline-color: color-mix(in oklch, var(--ring) 50%, transparent); }
    body {
      font-family: var(--font-sans);
      background-color: var(--background);
      color: var(--foreground);
    }

    /* v1c-b: Dense grid — JS fully controls grid-template-columns based on COLUMNS model. */
    .kanban-grid {
      display: grid;
      min-width: max-content;
    }

    .cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-height: 44px;
      padding: 2px;
      position: relative;
      background: var(--background);
    }

    .cell-empty:hover {
      background: color-mix(in oklch, var(--accent) 60%, transparent);
    }

    .hdr {
      background: var(--secondary);
      color: var(--secondary-foreground);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 2px;
      text-align: center;
    }

    .hdr-row1 { position: sticky; top: 0; z-index: 30; height: 28px; }
    .hdr-row2 { position: sticky; top: 28px; z-index: 29; height: 32px; }

    .time-cell {
      position: sticky;
      left: 0;
      z-index: 20;
      background: var(--secondary);
      color: var(--muted-foreground);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      min-height: 44px;
    }

    .time-cell-hdr {
      position: sticky;
      left: 0;
      z-index: 31;
    }

    /* Group color accents for header row1 (by palette index 0..5, extra → cycle) */
    .grp-0 { background: color-mix(in oklch, var(--chart-2) 15%, var(--secondary)); }
    .grp-1 { background: color-mix(in oklch, var(--chart-1) 15%, var(--secondary)); }
    .grp-2 { background: color-mix(in oklch, var(--chart-4) 18%, var(--secondary)); }
    .grp-3 { background: color-mix(in oklch, var(--chart-5) 15%, var(--secondary)); }
    .grp-4 { background: color-mix(in oklch, var(--chart-3) 15%, var(--secondary)); }
    .grp-5 { background: color-mix(in oklch, var(--chart-2) 20%, var(--secondary)); }
    .grp-6 { background: color-mix(in oklch, var(--chart-4) 12%, var(--secondary)); }
    .grp-7 { background: color-mix(in oklch, var(--chart-1) 10%, var(--secondary)); }

    /* Subtle column group separators */
    .col-sep-l { border-left: 2px solid color-mix(in oklch, var(--foreground) 15%, transparent); }

    /* Card chip */
    .chip {
      border-radius: 3px;
      border: 1px solid var(--border);
      border-left-width: 3px;
      padding: 2px 4px;
      font-size: 10px;
      line-height: 1.2;
      cursor: grab;
      transition: all 120ms ease;
    }
    .chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    /* v1c-b: strong selection visual (chip + empty cell) */
    .chip.is-selected {
      outline: 3px solid #2563eb;
      outline-offset: 2px;
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.25);
      z-index: 5;
      position: relative;
    }
    .cell.is-selected {
      background: rgba(37, 99, 235, 0.08);
      outline: 2px dashed #2563eb;
      outline-offset: -2px;
    }

    /* v1c-b: color picker for per-card override */
    .color-picker { display: flex; flex-wrap: wrap; gap: 6px; }
    .color-swatch {
      width: 24px; height: 24px; border-radius: 6px;
      border: 2px solid transparent; cursor: pointer;
      padding: 0;
      transition: transform 120ms, border-color 120ms;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37,99,235,0.25); }
    .color-swatch.color-default {
      background: repeating-linear-gradient(45deg, #e5e7eb, #e5e7eb 4px, #fff 4px, #fff 8px);
    }

    /* Scrollbar polish */
    .kanban-scroll::-webkit-scrollbar { height: 10px; width: 10px; }
    .kanban-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }
    .kanban-scroll::-webkit-scrollbar-track { background: transparent; }

    /* Status legend dots */
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    /* Implant stats widget (top bar) */
    #implantStats .implant-stat { display: inline-flex; align-items: center; gap: 4px; white-space: nowrap; }
    #implantStats .implant-sep { color: var(--muted-foreground); opacity: 0.5; margin: 0 2px; }
    #implantStats b { font-weight: 600; }
    #implantStats .stat-zero { color: color-mix(in oklch, var(--muted-foreground) 50%, transparent); }
    #implantStats .stat-nonzero { color: var(--foreground); }

    /* Dialog overlay (shadcn-style) */
    .dlg-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center;
      z-index: 100;
      animation: dlg-fade 150ms ease-out;
    }
    .dlg-overlay.open { display: flex; }
    .dlg {
      background: var(--background);
      color: var(--foreground);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      width: min(420px, calc(100vw - 2rem));
      padding: 20px;
      animation: dlg-pop 150ms ease-out;
    }
    .dlg h2 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .dlg p.dlg-desc { font-size: 12.5px; color: var(--muted-foreground); margin-bottom: 16px; }
    .dlg-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .dlg-field label { font-size: 12px; font-weight: 500; }
    .dlg-field select, .dlg-field input {
      height: 34px; padding: 0 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--background); color: var(--foreground);
      font-size: 13px; outline: none;
    }
    .dlg-field select:focus, .dlg-field input:focus { box-shadow: 0 0 0 2px color-mix(in oklch, var(--ring) 50%, transparent); }
    .dlg-error { font-size: 11.5px; color: #dc2626; margin-top: 4px; min-height: 14px; }
    .dlg-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
    .dlg-btn {
      height: 34px; padding: 0 14px; border-radius: var(--radius);
      font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid var(--border);
      background: var(--background); color: var(--foreground);
      transition: background 120ms;
    }
    .dlg-btn:hover { background: var(--accent); }
    .dlg-btn-primary { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
    .dlg-btn-primary:hover { background: color-mix(in oklch, var(--primary) 88%, #fff); }
    .dlg-btn-destructive { background: #dc2626; color: #fff; border-color: #dc2626; }
    .dlg-btn-destructive:hover { background: #b91c1c; }
    @keyframes dlg-fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dlg-pop { from { opacity: 0; transform: scale(0.96) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    /* v1c-b: Group-end "+" cell (all 3 rows) */
    .hdr-add {
      background: var(--muted);
      color: var(--muted-foreground);
      cursor: pointer;
      padding: 0;
      transition: background 120ms, color 120ms;
    }
    .hdr-add:hover {
      background: var(--accent);
      color: var(--accent-foreground);
    }
    .hdr-add i,
    .hdr-add svg { width: 14px; height: 14px; }

    /* Data-row placeholder column (non-interactive, just visual) */
    .cell-add-placeholder {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: color-mix(in oklch, var(--muted) 50%, var(--background));
      min-height: 44px;
    }

    /* v1c-b: inline editable header (any row) */
    .hdr-edit {
      padding: 0 2px !important;
      background: var(--background) !important;
    }
    .hdr-edit input {
      width: 100%;
      height: 24px;
      padding: 0 4px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      border: 1px solid var(--ring);
      border-radius: 3px;
      background: var(--background);
      color: var(--foreground);
      outline: none;
      box-shadow: 0 0 0 2px color-mix(in oklch, var(--ring) 40%, transparent);
    }

    /* v1c-b: delete icon overlay for user-added headers.
       NOTE: We must NOT override position from `sticky` (set on .hdr-row1/2/3) to
       `relative` here, because the parent `top: Npx` (used for sticky offset)
       would then be applied as a visual offset in the flow, pushing the cell into
       the wrong grid track (Row2 cell visually lands in Row3, Row3 cell in data row).
       Instead we keep `position: sticky` inherited from the row-level rules — sticky
       is a positioned element and works as a containing block for the absolutely
       positioned .hdr-del child, so the delete icon overlay still anchors correctly. */
    .hdr-del {
      position: absolute;
      top: 2px; right: 2px;
      width: 14px; height: 14px;
      display: none;
      align-items: center; justify-content: center;
      border-radius: 3px;
      cursor: pointer;
      color: var(--muted-foreground);
    }
    .hdr-del:hover {
      background: color-mix(in oklch, var(--destructive) 20%, transparent);
      color: var(--destructive);
    }
    .hdr-del[data-disabled="true"] {
      cursor: not-allowed;
      opacity: 0.4;
    }
    .hdr-del[data-disabled="true"]:hover {
      background: transparent;
      color: var(--muted-foreground);
    }
    .hdr-del i { width: 11px; height: 11px; }
    .hdr[data-user-added="true"]:hover .hdr-del { display: inline-flex; }

    /* Toast (bottom-right) */
    .toast-wrap { position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 120; pointer-events: none; }
    .toast {
      background: var(--background); color: var(--foreground);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px 14px; font-size: 13px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
      pointer-events: auto;
      animation: toast-in 180ms ease-out;
      max-width: 320px;
    }
    .toast-error { border-left: 3px solid #dc2626; }
    .toast-success { border-left: 3px solid #10b981; }
    @keyframes toast-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* ========= Card Side Panel (Sheet) ========= */
    #cardPanel {
      position: fixed; top: 0; right: 0; height: 100vh; width: 360px;
      background: var(--background);
      color: var(--foreground);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 200ms ease-out;
      z-index: 100;
      box-shadow: -4px 0 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
    #cardPanel.open { transform: translateX(0); }
    .card-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .card-panel-header h3 { font-size: 14px; font-weight: 600; }
    .card-panel-close {
      width: 28px; height: 28px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--radius);
      cursor: pointer; color: var(--muted-foreground);
      border: 1px solid transparent;
    }
    .card-panel-close:hover { background: var(--accent); color: var(--foreground); }
    .card-panel-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .card-panel-field { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
    .card-panel-field label { font-size: 12px; font-weight: 500; color: var(--foreground); }
    .card-panel-field input,
    .card-panel-field select,
    .card-panel-field textarea {
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--background);
      color: var(--foreground);
      font-size: 13px;
      outline: none;
      font-family: inherit;
    }
    .card-panel-field input:focus,
    .card-panel-field select:focus,
    .card-panel-field textarea:focus {
      box-shadow: 0 0 0 2px color-mix(in oklch, var(--ring) 50%, transparent);
    }
    .card-panel-field textarea { min-height: 72px; resize: vertical; }
    .card-panel-field input[readonly],
    .card-panel-field input:read-only,
    .card-panel-field select:disabled {
      background: var(--muted);
      color: var(--muted-foreground);
      cursor: not-allowed;
    }
    .card-panel-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; min-width: 0; }
    .card-panel-row > .card-panel-field { min-width: 0; }
    .card-panel-actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; gap: 8px;
    }
    .card-panel-actions .left { display: flex; gap: 8px; }
    .card-panel-actions .right { display: flex; gap: 8px; }

    /* ========= Inline add input ========= */
    .inline-add-input {
      width: 100%;
      height: 32px;
      padding: 2px 6px;
      font-size: 11px;
      font-family: inherit;
      border: 1px solid var(--ring);
      border-radius: 3px;
      background: var(--background);
      color: var(--foreground);
      outline: none;
      box-shadow: 0 0 0 2px color-mix(in oklch, var(--ring) 40%, transparent);
    }

    /* ========= Custom Context Menu ========= */
    .ctx-menu {
      position: fixed;
      background: var(--popover);
      color: var(--popover-foreground);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 4px;
      min-width: 160px;
      z-index: 200;
      font-size: 12.5px;
      animation: ctx-pop 100ms ease-out;
    }
    @keyframes ctx-pop {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ctx-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border-radius: calc(var(--radius) - 2px);
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    .ctx-item:hover { background: var(--accent); }
    .ctx-item.destructive { color: #dc2626; }
    .ctx-item.destructive:hover { background: color-mix(in oklch, #dc2626 12%, transparent); }
    .ctx-item .ctx-arrow { margin-left: auto; opacity: 0.6; }
    .ctx-item i, .ctx-item svg { width: 14px; height: 14px; }
    .ctx-sep {
      height: 1px; background: var(--border);
      margin: 4px 0;
    }
    .ctx-submenu {
      position: absolute;
      top: -4px;
      left: 100%;
      margin-left: 2px;
      background: var(--popover);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      padding: 4px;
      min-width: 140px;
      display: none;
    }
    .ctx-item-with-sub { position: relative; }
    .ctx-item-with-sub:hover > .ctx-submenu { display: block; }
  </style>
</head>
<body class="bg-background text-foreground">

  <!-- Top Bar -->
  <header class="sticky top-0 z-50 h-14 border-b border-border bg-background/95 backdrop-blur flex items-center px-4 gap-3">
    <div class="flex items-center gap-2 min-w-[260px]">
      <div class="w-8 h-8 rounded-md bg-primary text-primary-foreground flex items-center justify-center">
        <i data-lucide="stethoscope" class="w-4 h-4"></i>
      </div>
      <div class="flex flex-col leading-tight">
        <span class="text-sm font-semibold">치과 상담 <span class="text-muted-foreground font-normal">v1c-b 2계층 + 그룹 규칙</span></span>
        <span class="text-[11px] text-muted-foreground">예약 대시보드</span>
      </div>
    </div>

    <!-- Date navigation center -->
    <div class="flex-1 flex items-center justify-center gap-1.5">

      const icon = darkToggle.querySelector('i');
      const isDark = document.documentElement.classList.contains('dark');
      icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
      lucide.createIcons();

    (function() {
      // v1c-b: per-date keyed storage.
      //   - Legacy un-dated keys are migrated into today's keyed namespace on first load.
      //   - STORAGE_KEY (zone positions) is derived from CARDS and kept per-date as well for back-compat.
      const STORAGE_KEY_BASE = 'kanban-v1c-b-state';
      const COLUMNS_KEY_BASE = 'kanban-v1c-b-columns';
      const CARDS_KEY_BASE   = 'kanban-v1c-b-cards';

      const DAYS_KR = ['일','월','화','수','목','금','토'];
      function toDateKey(d) {
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,'0');
        const dd = String(d.getDate()).padStart(2,'0');
        return `${y}-${m}-${dd}`;
      }
      function fromDateKey(s) {
        const [y,m,d] = s.split('-').map(Number);
        return new Date(y, m-1, d);
      }
      function dateLabel(s) {
        const d = fromDateKey(s);
        return `${s} (${DAYS_KR[d.getDay()]})`;
      }
      function shiftDateKey(s, deltaDays) {
        const d = fromDateKey(s);
        d.setDate(d.getDate() + deltaDays);
        return toDateKey(d);
      }
      function cardsKey(date)    { return `${CARDS_KEY_BASE}-${date}`; }
      function columnsKey(date)  { return `${COLUMNS_KEY_BASE}-${date}`; }
      function stateKey(date)    { return `${STORAGE_KEY_BASE}-${date}`; }

      // currentDate — authoritative date for all per-date IO. Initialised in Init block below.
      let currentDate = toDateKey(new Date());

      // One-time migration: move any legacy un-dated keys into today's namespace.
      (function migrateOldData() {
        const today = toDateKey(new Date());
        const oldCards = localStorage.getItem(CARDS_KEY_BASE);
        if (oldCards && !localStorage.getItem(cardsKey(today))) {
          localStorage.setItem(cardsKey(today), oldCards);
        }
        const oldCols = localStorage.getItem(COLUMNS_KEY_BASE);
        if (oldCols && !localStorage.getItem(columnsKey(today))) {
          localStorage.setItem(columnsKey(today), oldCols);
        }
        const oldState = localStorage.getItem(STORAGE_KEY_BASE);
        if (oldState && !localStorage.getItem(stateKey(today))) {
          localStorage.setItem(stateKey(today), oldState);
        }
        localStorage.removeItem(CARDS_KEY_BASE);
        localStorage.removeItem(COLUMNS_KEY_BASE);
        localStorage.removeItem(STORAGE_KEY_BASE);
      })();

      // Find the most-recent columns snapshot strictly BEFORE `date`. Returns full key or null.
      function findPrevColumnsKey(date) {
        const prefix = COLUMNS_KEY_BASE + '-';
        const dates = [];
        for (let i = 0; i < localStorage.length; i++) {
          const k = localStorage.key(i);
          if (!k || !k.startsWith(prefix)) continue;
          const d = k.slice(prefix.length);
          // Basic YYYY-MM-DD shape check to ignore any unrelated keys
          if (/^\d{4}-\d{2}-\d{2}$/.test(d) && d < date) dates.push(d);
        }
        dates.sort();
        return dates.length > 0 ? prefix + dates[dates.length - 1] : null;
      }

      // ---------- Time slots ----------
      const TIME_SLOTS = [
        '9:00','9:30','10:00','10:30','11:00','11:30','12:00','12:30',
        '13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30',
        '17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30'

      const COUNSELORS = ['김수지', '라근주', '유소연'];

      // Per-row1 leaf width (by row1.id). Missing → default 64.

      const R1_LEAF_WIDTH = {
        r1_구환: 88, r1_신환: 88, r1_예진: 56,
