openapi: 3.0.0
info:
  title: Kanban API
  version: 0.1.0
  description: |
    상담 칸반 보드 API. 단일 사용자 환경 (인증 없음).

    - 날짜별로 컬럼 구조(row1/row2)와 카드를 관리합니다.
    - 템플릿을 통해 컬럼 구조를 다른 날짜에 적용할 수 있습니다.
    - 동일 차트번호 카드 간 형제 동기화(propagation) 기능을 제공합니다.

servers:
  - url: /
    description: Default server

tags:
  - name: boards
    description: 보드 스냅샷 (컬럼 + 카드 통합 조회)
  - name: columns
    description: 일자별 컬럼(row1/row2) CRUD 및 재정렬
  - name: cards
    description: 카드 CRUD, 이동, 형제 조회
  - name: templates
    description: 컬럼 구조 템플릿 CRUD
  - name: stats
    description: 통계 (임플란트 등)
  - name: defaults
    description: 클라이언트 부트스트랩 정적 상수

paths:
  /api/boards/{date}:
    get:
      tags: [boards]
      summary: 일자별 보드 스냅샷 조회
      description: |
        지정한 날짜의 컬럼 구조(row1/row2)와 카드 전체를 한 번에 조회합니다.
        형제 카드 propagation(동일 차트번호 동기화)이 적용된 상태로 반환됩니다.
      parameters:
        - $ref: '#/components/parameters/DatePath'
      responses:
        '200':
          description: 보드 스냅샷
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardSnapshot'
              example:
                date: '2026-04-27'
                columns:
                  date: '2026-04-27'
                  row1:
                    - { id: r1_구환, date: '2026-04-27', label: 구환상담, position: 0, built_in: true }
                    - { id: r1_신환, date: '2026-04-27', label: 신환상담, position: 1, built_in: true }
                  row2:
                    - { id: r2_구환, date: '2026-04-27', row1_id: r1_구환, label: 구환, position: 0, built_in: true }
                    - { id: r2_신환, date: '2026-04-27', row1_id: r1_신환, label: 신환, position: 0, built_in: true }
                cards:
                  - id: card_001
                    date: '2026-04-27'
                    row1_id: r1_신환
                    row2_id: r2_신환
                    time: '10:00'
                    name: 홍길동
                    chart: '12345'
                    counselor: 김수지
                    book_time: '10:00'
                    consult_time: '15'
                    memo: ''
                    color: ''
                    created_at: '2026-04-27T09:00:00Z'
                    updated_at: '2026-04-27T09:00:00Z'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/boards/{date}/apply-template:
    post:
      tags: [boards]
      summary: 템플릿을 보드에 적용
      description: |
        지정한 템플릿의 컬럼 구조를 해당 날짜에 적용합니다.
        기존 컬럼은 교체되며, 적용 후의 보드 스냅샷이 반환됩니다.
      parameters:
        - $ref: '#/components/parameters/DatePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplyTemplateRequest'
            example:
              template_id: tpl_default
      responses:
        '200':
          description: 템플릿이 적용된 보드 스냅샷
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BoardSnapshot'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/columns/{date}:
    get:
      tags: [columns]
      summary: 일자별 컬럼 구조 조회
      description: 해당 날짜의 row1/row2 컬럼 목록을 반환합니다.
      parameters:
        - $ref: '#/components/parameters/DatePath'
      responses:
        '200':
          description: 컬럼 묶음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnsBundle'

  /api/columns/{date}/row1:
    post:
      tags: [columns]
      summary: row1 컬럼 추가
      description: 해당 날짜에 새로운 row1 컬럼을 추가합니다.
      parameters:
        - $ref: '#/components/parameters/DatePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColumnRow1Create'
            example:
              label: 기타상담
              position: 6
      responses:
        '201':
          description: 생성된 row1 컬럼
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnRow1'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/columns/{date}/row1/{r1_id}:
    parameters:
      - $ref: '#/components/parameters/DatePath'
      - name: r1_id
        in: path
        required: true
        schema: { type: string }
        description: row1 컬럼 ID
    patch:
      tags: [columns]
      summary: row1 컬럼 수정
      description: row1 컬럼의 라벨 또는 위치를 수정합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColumnRow1Update'
            example:
              label: 변경된 라벨
              position: 2
      responses:
        '200':
          description: 수정된 row1 컬럼
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnRow1'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [columns]
      summary: row1 컬럼 삭제
      description: |
        row1 컬럼 및 하위 row2 컬럼, 소속 카드를 삭제합니다.
        built_in=true 컬럼은 삭제 불가합니다.
      responses:
        '204':
          description: 삭제 성공
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/columns/{date}/row2:
    post:
      tags: [columns]
      summary: row2 컬럼 추가
      description: 해당 날짜에 새로운 row2 컬럼을 추가합니다.
      parameters:
        - $ref: '#/components/parameters/DatePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColumnRow2Create'
            example:
              row1_id: r1_임플
              label: 추가리프
              position: 3
      responses:
        '201':
          description: 생성된 row2 컬럼
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnRow2'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/columns/{date}/row2/{r2_id}:
    parameters:
      - $ref: '#/components/parameters/DatePath'
      - name: r2_id
        in: path
        required: true
        schema: { type: string }
        description: row2 컬럼 ID
    patch:
      tags: [columns]
      summary: row2 컬럼 수정
      description: row2 컬럼의 라벨, 위치, 소속 row1을 수정합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ColumnRow2Update'
            example:
              label: 변경된 리프
              position: 1
      responses:
        '200':
          description: 수정된 row2 컬럼
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnRow2'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [columns]
      summary: row2 컬럼 삭제
      description: |
        row2 컬럼 및 소속 카드를 삭제합니다.
        built_in=true 컬럼은 삭제 불가합니다.
      responses:
        '204':
          description: 삭제 성공
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/columns/{date}/reorder:
    put:
      tags: [columns]
      summary: 컬럼 재정렬
      description: |
        row1 또는 row2 컬럼의 순서를 일괄 재정렬합니다.
        row1_ids 가 있으면 row1 순서를, row2_ids 가 있으면 각 row1 하위의 row2 순서를 변경합니다.
      parameters:
        - $ref: '#/components/parameters/DatePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReorderRequest'
            example:
              row1_ids: [r1_구환, r1_신환, r1_예진, r1_임플, r1_일반, r1_전화]
              row2_ids:
                r1_임플: [r2_임플_상, r2_임플_중, r2_임플_하]
      responses:
        '200':
          description: 재정렬된 컬럼 묶음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ColumnsBundle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/cards:
    get:
      tags: [cards]
      summary: 일자별 카드 목록 조회
      description: 지정한 날짜의 카드 전체를 반환합니다.
      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
          description: 조회 일자 (YYYY-MM-DD)
      responses:
        '200':
          description: 카드 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'
    post:
      tags: [cards]
      summary: 카드 생성
      description: |
        새로운 카드를 생성합니다.
        single_card_r1 에 속한 row1 의 동일 시간 슬롯은 카드 1개만 허용됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardCreate'
            example:
              date: '2026-04-27'
              row1_id: r1_신환
              row2_id: r2_신환
              time: '10:00'
              name: 홍길동
              chart: '12345'
              counselor: 김수지
              book_time: '10:00'
              consult_time: '15'
              memo: ''
              color: ''
      responses:
        '201':
          description: 생성된 카드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/cards/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: 카드 ID
    patch:
      tags: [cards]
      summary: 카드 수정
      description: |
        카드 필드를 수정합니다.
        sync_siblings=true 이면 동일 차트번호의 형제 카드들도 동일 필드로 동기화됩니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardUpdate'
            example:
              name: 홍길동(수정)
              chart: '12345'
              counselor: 라근주
              memo: 메모 변경
              sync_siblings: true
      responses:
        '200':
          description: 수정된 카드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [cards]
      summary: 카드 삭제
      responses:
        '204':
          description: 삭제 성공
        '404':
          $ref: '#/components/responses/NotFound'

  /api/cards/{id}/move:
    patch:
      tags: [cards]
      summary: 카드 이동
      description: |
        카드의 시간/소속 컬럼(row1/row2)을 변경합니다.
        single_card_r1 컬럼 내 충돌 시 409.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: 카드 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardMove'
            example:
              time: '11:30'
              row1_id: r1_임플
              row2_id: r2_임플_상
      responses:
        '200':
          description: 이동된 카드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/cards/by-chart:
    get:
      tags: [cards]
      summary: 차트번호로 형제 카드 조회
      description: |
        동일 차트번호를 가진 카드들을 조회합니다 (formula propagation 용).
        date 가 주어지면 해당 일자로 한정합니다.
      parameters:
        - name: chart
          in: query
          required: true
          schema: { type: string }
          description: 차트번호
        - name: date
          in: query
          required: false
          schema: { type: string, format: date }
          description: 조회 일자 (옵션)
      responses:
        '200':
          description: 동일 차트번호 카드 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Card'

  /api/stats/implant:
    get:
      tags: [stats]
      summary: 임플란트 통계 조회
      description: 해당 일자의 임플란트(row1=r1_임플) 카드 수를 row2 별로 집계합니다.
      parameters:
        - name: date
          in: query
          required: true
          schema: { type: string, format: date }
          description: 조회 일자
      responses:
        '200':
          description: 임플란트 통계
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImplantStats'
              example:
                date: '2026-04-27'
                total: 5
                by_leaf:
                  r2_임플_상: { label: 상, count: 2 }
                  r2_임플_중: { label: 중, count: 2 }
                  r2_임플_하: { label: 하, count: 1 }

  /api/templates:
    get:
      tags: [templates]
      summary: 템플릿 목록 조회
      responses:
        '200':
          description: 템플릿 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Template'
    post:
      tags: [templates]
      summary: 템플릿 생성
      description: |
        새 템플릿을 생성합니다.
        source_date 가 주어지면 해당 일자의 현재 컬럼 구조를 기반으로 생성합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateCreate'
            example:
              name: 기본 템플릿
              source_date: '2026-04-27'
      responses:
        '201':
          description: 생성된 템플릿
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/templates/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string }
        description: 템플릿 ID
    get:
      tags: [templates]
      summary: 템플릿 단건 조회
      responses:
        '200':
          description: 템플릿
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [templates]
      summary: 템플릿 수정
      description: 이름이나 row1/row2 구조를 수정합니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateUpdate'
            example:
              name: 수정된 템플릿
              row1:
                - { id: r1_구환, label: 구환상담 }
                - { id: r1_신환, label: 신환상담 }
              row2:
                - { id: r2_구환, row1_id: r1_구환, label: 구환 }
                - { id: r2_신환, row1_id: r1_신환, label: 신환 }
      responses:
        '200':
          description: 수정된 템플릿
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [templates]
      summary: 템플릿 삭제
      description: is_default=true 템플릿은 삭제 불가입니다.
      responses:
        '204':
          description: 삭제 성공
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/templates/{id}/duplicate:
    post:
      tags: [templates]
      summary: 템플릿 복제
      description: 기존 템플릿을 복제하여 새 템플릿을 생성합니다.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
          description: 복제 원본 템플릿 ID
      responses:
        '201':
          description: 복제된 템플릿
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Template'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/defaults:
    get:
      tags: [defaults]
      summary: 클라이언트 부트스트랩 정적 상수
      description: |
        클라이언트가 부팅 시 1회 로드하는 정적 기본값 묶음입니다.
        기본 row1/row2, 상담사 목록, 시간 슬롯, 컬럼 너비, 단일카드 제약 등을 포함합니다.
      responses:
        '200':
          description: 기본 상수 묶음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Defaults'
              example:
                row1:
                  - { id: r1_구환, label: 구환상담 }
                  - { id: r1_신환, label: 신환상담 }
                  - { id: r1_예진, label: 예진현황 }
                  - { id: r1_임플, label: 임플상담 }
                  - { id: r1_일반, label: 일반상담 }
                  - { id: r1_전화, label: 전화상담 }
                row2:
                  - { id: r2_구환, row1_id: r1_구환, label: 구환 }
                  - { id: r2_신환, row1_id: r1_신환, label: 신환 }
                counselors: [김수지, 라근주, 유소연]
                time_slots: ['9:00', '9:30', '10:00', '10:30', '11:00', '11:30', '12:00', '12:30', '13:00', '13:30', '14:00', '14:30', '15:00', '15:30', '16:00', '16:30', '17:00', '17:30', '18:00', '18:30', '19:00', '19:30', '20:00', '20:30']
                r1_leaf_width:
                  r1_구환: 88
                  r1_신환: 88
                  r1_예진: 56
                  r1_임플: 52
                  r1_일반: 52
                  r1_전화: 76
                single_card_r1: [r1_구환, r1_신환]
                dup_allowed_r1: [r1_임플, r1_일반]
                color_palette: ['', '#fde2e2', '#fde9c9', '#fff4b8', '#d8f0d2', '#d2e7f7', '#e3d9f4']

components:
  parameters:
    DatePath:
      name: date
      in: path
      required: true
      schema:
        type: string
        format: date
      description: 일자 (YYYY-MM-DD)
      example: '2026-04-27'

  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: 제약 충돌 (built_in 삭제, 단일카드 슬롯 충돌, 기본 템플릿 삭제 등)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: 에러 코드
          example: NOT_FOUND
        message:
          type: string
          description: 에러 메시지 (사용자 노출용)
          example: 리소스를 찾을 수 없습니다.
        detail:
          type: string
          nullable: true
          description: 상세 디버그 정보 (옵션)

    ColumnRow1:
      type: object
      required: [id, date, label, position, built_in]
      properties:
        id:
          type: string
          description: row1 컬럼 ID
          example: r1_신환
        date:
          type: string
          format: date
          description: 일자
          example: '2026-04-27'
        label:
          type: string
          description: 컬럼 라벨
          example: 신환상담
        position:
          type: integer
          description: 표시 순서 (0부터 시작)
          example: 1
        built_in:
          type: boolean
          description: 시스템 기본 컬럼 여부 (true 면 삭제 불가)
          example: true

    ColumnRow1Create:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: 신규 컬럼 라벨
          example: 기타상담
        position:
          type: integer
          nullable: true
          description: 표시 순서 (미지정 시 마지막)

    ColumnRow1Update:
      type: object
      properties:
        label:
          type: string
          nullable: true
        position:
          type: integer
          nullable: true

    ColumnRow2:
      type: object
      required: [id, date, row1_id, label, position, built_in]
      properties:
        id:
          type: string
          example: r2_임플_상
        date:
          type: string
          format: date
        row1_id:
          type: string
          description: 부모 row1 컬럼 ID
          example: r1_임플
        label:
          type: string
          example: 상
        position:
          type: integer
          example: 0
        built_in:
          type: boolean
          example: true

    ColumnRow2Create:
      type: object
      required: [row1_id, label]
      properties:
        row1_id:
          type: string
          description: 부모 row1 컬럼 ID
        label:
          type: string
        position:
          type: integer
          nullable: true

    ColumnRow2Update:
      type: object
      properties:
        label:
          type: string
          nullable: true
        position:
          type: integer
          nullable: true
        row1_id:
          type: string
          nullable: true
          description: 다른 row1 로 이동 시 사용

    ColumnsBundle:
      type: object
      required: [date, row1, row2]
      properties:
        date:
          type: string
          format: date
        row1:
          type: array
          items:
            $ref: '#/components/schemas/ColumnRow1'
        row2:
          type: array
          items:
            $ref: '#/components/schemas/ColumnRow2'

    ReorderRequest:
      type: object
      description: |
        row1 또는 row2 의 정렬 순서를 일괄 지정합니다.
        둘 중 하나 이상이 포함되어야 합니다.
      properties:
        row1_ids:
          type: array
          nullable: true
          description: row1 컬럼 ID의 새 순서
          items:
            type: string
          example: [r1_구환, r1_신환, r1_예진, r1_임플, r1_일반, r1_전화]
        row2_ids:
          type: object
          nullable: true
          description: row1 ID 별 row2 컬럼 ID 의 새 순서
          additionalProperties:
            type: array
            items:
              type: string
          example:
            r1_임플: [r2_임플_상, r2_임플_중, r2_임플_하]

    Card:
      type: object
      required:
        [
          id,
          date,
          row1_id,
          row2_id,
          time,
          name,
          chart,
          counselor,
          book_time,
          consult_time,
          memo,
          color,
          created_at,
          updated_at,
        ]
      properties:
        id:
          type: string
          example: card_001
        date:
          type: string
          format: date
        row1_id:
          type: string
          example: r1_신환
        row2_id:
          type: string
          example: r2_신환
        time:
          type: string
          description: 슬롯 시간 (HH:MM)
          example: '10:00'
        name:
          type: string
          description: 환자 이름
          example: 홍길동
        chart:
          type: string
          description: 차트번호 (형제 동기화 키)
          example: '12345'
        counselor:
          type: string
          description: 상담사
          example: 김수지
        book_time:
          type: string
          description: 예약 시간 (HH:MM 또는 빈 문자열)
          example: '10:00'
        consult_time:
          type: string
          description: 상담 소요 시간 (분 단위 문자열)
          example: '15'
        memo:
          type: string
          description: 메모
        color:
          type: string
          description: 카드 배경 색상 (HEX 또는 빈 문자열)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CardCreate:
      type: object
      required: [date, row1_id, row2_id, time]
      properties:
        date:
          type: string
          format: date
        row1_id:
          type: string
        row2_id:
          type: string
        time:
          type: string
          description: 슬롯 시간 (HH:MM)
        name:
          type: string
          nullable: true
        chart:
          type: string
          nullable: true
        counselor:
          type: string
          nullable: true
        book_time:
          type: string
          nullable: true
        consult_time:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        color:
          type: string
          nullable: true

    CardUpdate:
      type: object
      description: |
        카드 필드 부분 수정. sync_siblings=true 면 동일 chart 의 형제 카드도 동기화됩니다.
      properties:
        name:
          type: string
          nullable: true
        chart:
          type: string
          nullable: true
        counselor:
          type: string
          nullable: true
        book_time:
          type: string
          nullable: true
        consult_time:
          type: string
          nullable: true
        memo:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        sync_siblings:
          type: boolean
          nullable: true
          description: 동일 차트번호의 형제 카드도 동일 필드로 동기화할지 여부
          example: true

    CardMove:
      type: object
      description: 카드 이동 (시간/소속 컬럼 변경)
      properties:
        time:
          type: string
          nullable: true
          description: 새 슬롯 시간 (HH:MM)
        row1_id:
          type: string
          nullable: true
        row2_id:
          type: string
          nullable: true

    Template:
      type: object
      required: [id, name, row1, row2, is_default, created_at, updated_at]
      properties:
        id:
          type: string
          example: tpl_default
        name:
          type: string
          example: 기본 템플릿
        row1:
          type: array
          items:
            $ref: '#/components/schemas/TemplateColumnItem'
        row2:
          type: array
          items:
            $ref: '#/components/schemas/TemplateLeafItem'
        is_default:
          type: boolean
          description: 시스템 기본 템플릿 여부 (true 면 삭제 불가)
          example: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TemplateColumnItem:
      type: object
      required: [id, label]
      properties:
        id:
          type: string
          example: r1_신환
        label:
          type: string
          example: 신환상담

    TemplateLeafItem:
      type: object
      required: [id, row1_id, label]
      properties:
        id:
          type: string
          example: r2_신환
        row1_id:
          type: string
          example: r1_신환
        label:
          type: string
          example: 신환

    TemplateCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 새 템플릿
        source_date:
          type: string
          format: date
          nullable: true
          description: 해당 일자의 컬럼 구조를 기반으로 템플릿 생성

    TemplateUpdate:
      type: object
      properties:
        name:
          type: string
          nullable: true
        row1:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TemplateColumnItem'
        row2:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TemplateLeafItem'

    BoardSnapshot:
      type: object
      required: [date, columns, cards]
      properties:
        date:
          type: string
          format: date
        columns:
          $ref: '#/components/schemas/ColumnsBundle'
        cards:
          type: array
          items:
            $ref: '#/components/schemas/Card'

    ApplyTemplateRequest:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: string
          description: 적용할 템플릿 ID
          example: tpl_default

    ImplantLeafCount:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
          example: 상
        count:
          type: integer
          example: 2

    ImplantStats:
      type: object
      required: [date, total, by_leaf]
      properties:
        date:
          type: string
          format: date
        total:
          type: integer
          description: 임플란트 카드 총 수
          example: 5
        by_leaf:
          type: object
          description: row2 ID 를 키로 한 집계 결과
          additionalProperties:
            $ref: '#/components/schemas/ImplantLeafCount'

    Defaults:
      type: object
      required:
        [
          row1,
          row2,
          counselors,
          time_slots,
          r1_leaf_width,
          single_card_r1,
          dup_allowed_r1,
          color_palette,
        ]
      properties:
        row1:
          type: array
          description: 기본 row1 컬럼 6개
          items:
            $ref: '#/components/schemas/TemplateColumnItem'
        row2:
          type: array
          description: 기본 row2 컬럼 28개
          items:
            $ref: '#/components/schemas/TemplateLeafItem'
        counselors:
          type: array
          description: 상담사 목록
          items:
            type: string
          example: [김수지, 라근주, 유소연]
        time_slots:
          type: array
          description: 시간 슬롯 (HH:MM 24개, 30분 간격)
          items:
            type: string
          example: ['9:00', '9:30', '10:00']
        r1_leaf_width:
          type: object
          description: row1 ID 별 leaf 컬럼 픽셀 너비
          additionalProperties:
            type: integer
          example:
            r1_구환: 88
            r1_신환: 88
            r1_예진: 56
            r1_임플: 52
            r1_일반: 52
            r1_전화: 76
        single_card_r1:
          type: array
          description: 동일 슬롯에 카드 1개만 허용되는 row1 ID 목록
          items:
            type: string
          example: [r1_구환, r1_신환]
        dup_allowed_r1:
          type: array
          description: 동일 차트번호 중복(여러 row2) 허용 row1 ID 목록
          items:
            type: string
          example: [r1_임플, r1_일반]
        color_palette:
          type: array
          description: 카드 색상 팔레트 (HEX 또는 빈 문자열)
          items:
            type: string
          example: ['', '#fde2e2', '#fde9c9', '#fff4b8', '#d8f0d2', '#d2e7f7', '#e3d9f4']
